<div class="card w-96 bg-base-200/80 backdrop-blur-xl border border-white/10 shadow-[0_0_30px_rgba(0,0,0,0.5)]">
  <div class="card-body">
    <div class="text-center mb-4">
      <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-emerald-600">Nuevo Colmado</h2>
      <p class="text-base-content/60 mt-1">Empieza a gestionar hoy</p>
    </div>
    <div class="form-control w-full">
      <label class="label"><span class="label-text text-base-content/80">Nombre del Negocio</span></label>
      <input type="text" class="input bg-base-100 border-white/5 focus:border-primary focus:ring-1 focus:ring-primary w-full transition-all" />
    </div>
    <div class="form-control w-full mt-3">
      <label class="label"><span class="label-text text-base-content/80">Correo Electrónico</span></label>
      <input type="email" class="input bg-base-100 border-white/5 focus:border-primary focus:ring-1 focus:ring-primary w-full transition-all" />
    </div>
    <div class="form-control w-full mt-3">
      <label class="label"><span class="label-text text-base-content/80">Contraseña</span></label>
      <input type="password" class="input bg-base-100 border-white/5 focus:border-primary focus:ring-1 focus:ring-primary w-full transition-all" />
    </div>
    <div class="card-actions mt-8">
      <button class="btn btn-primary w-full shadow-[0_0_15px_rgba(16,185,129,0.4)] border-none hover:brightness-110">Crear Cuenta</button>
    </div>
    <div class="text-center mt-6">
      <p class="text-sm text-base-content/60">¿Ya tienes cuenta? <a routerLink="/auth/login" class="text-primary hover:text-primary/80 font-medium transition-colors">Inicia Sesión</a></p>
      <div class="mt-4"><a routerLink="/" class="text-xs text-base-content/40 hover:text-base-content/80 transition-colors">← Volver</a></div>
    </div>
  </div>
</div>
