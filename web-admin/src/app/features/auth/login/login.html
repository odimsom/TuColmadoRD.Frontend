<div class="card w-96 bg-base-200/80 backdrop-blur-xl border border-white/10 shadow-2xl">
  <div class="card-body">
    <div class="text-center mb-4">
      <h2 class="text-3xl font-bold text-white tracking-tight">Acceso VIP</h2>
      <p class="text-slate-400 text-sm mt-1">Gestiona tu colmado</p>
    </div>

    @if (error) {
      <div class="alert alert-error text-xs py-2 rounded-lg mb-4">
        <span>{{ error }}</span>
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="form-control w-full">
        <label class="label"><span class="label-text text-slate-300 text-xs uppercase tracking-wider font-semibold">ID del Colmado</span></label>
        <input type="text" formControlName="tenantId" placeholder="Ej: 550e8400-e29b-..." class="input bg-[#0f172a] border-white/5 focus:border-primary focus:ring-1 focus:ring-primary w-full transition-all text-sm" />
      </div>

      <div class="form-control w-full">
        <label class="label"><span class="label-text text-slate-300 text-xs uppercase tracking-wider font-semibold">Correo Electrónico</span></label>
        <input type="email" formControlName="email" placeholder="tu@colmado.com" class="input bg-[#0f172a] border-white/5 focus:border-primary focus:ring-1 focus:ring-primary w-full transition-all text-sm" />
      </div>

      <div class="form-control w-full">
        <label class="label"><span class="label-text text-slate-300 text-xs uppercase tracking-wider font-semibold">Contraseña</span></label>
        <input type="password" formControlName="password" placeholder="••••••••" class="input bg-[#0f172a] border-white/5 focus:border-primary focus:ring-1 focus:ring-primary w-full transition-all text-sm" />
      </div>

      <div class="card-actions mt-8">
        <button type="submit" [disabled]="loginForm.invalid || loading" class="btn btn-primary w-full border-none shadow-lg shadow-blue-500/20">
          @if (loading) {
            <span class="loading loading-spinner loading-sm"></span>
          } @else {
            Entrar al Sistema
          }
        </button>
      </div>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-slate-400">¿No tienes cuenta? <a routerLink="/auth/register" class="text-blue-500 hover:text-blue-400 font-medium transition-colors">Crea tu colmado</a></p>
      <div class="mt-4"><a routerLink="/" class="text-xs text-slate-500 hover:text-slate-300 transition-colors flex items-center justify-center gap-1"><span class="icon-[ic--baseline-arrow-back]"></span> Volver</a></div>
    </div>
  </div>
</div>
