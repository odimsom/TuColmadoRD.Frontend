name: Build & Release Test

on:
  push:
    tags:
      - 'v*-test'      # dispara solo con tags tipo v0.1.0-test

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Using .NET 10 as confirmed earlier

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Install frontend dependencies
        run: |
          cd web-admin
          npm ci

      - name: Set version from tag
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build Angular + .exe + Installer
        run: |
          $env:RELEASE_TYPE = "test"
          $env:APP_VERSION = "${{ env.APP_VERSION }}"
          ./scripts/build-desktop.ps1
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TuColmadoRD ${{ github.ref_name }} - Test Release"
          prerelease: true
          body: |
            ## ⚠️ Versión de Prueba — NO para producción
            
            ### Cómo instalar
            1. Descargar el archivo `.exe` de abajo
            2. Ejecutar como administrador
            3. Vincular con tu cuenta al abrir
            
            **Soporte:** https://wa.me/18296932458
          files: |
            TuColmadoRD/publish/installer/TuColmadoRD-Setup-v${{ env.APP_VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
