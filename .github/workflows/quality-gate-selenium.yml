name: Quality Gate - Selenium Task4

on:
  push:
    branches:
      - main
      - master
      - develop
      - Develop
      - qa
      - QA
  pull_request:
    branches:
      - main
      - master
      - develop
      - Develop

jobs:
  selenium-task4:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: web-admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Run Selenium Task4 suite (headless)
        run: npm run test:e2e:task4

      - name: Upload Selenium artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-task4-artifacts
          path: web-admin/tests/e2e/artifacts
          if-no-files-found: warn
